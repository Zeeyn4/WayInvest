services:
  postgres:
    image: postgres:16-alpine
    container_name: wayinvest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wayinvest
      POSTGRES_PASSWORD: wayinvest
      POSTGRES_DB: wayinvest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
