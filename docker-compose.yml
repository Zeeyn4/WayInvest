services:
  postgres:
    image: postgres:16-alpine
    container_name: wayinvest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wayinvest
      POSTGRES_PASSWORD: wayinvest
      POSTGRES_DB: wayinvest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayinvest"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wayinvest-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wayinvest:wayinvest@postgres:5432/wayinvest?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      BREVO_API_KEY: ${BREVO_API_KEY}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: wayinvest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
